name: Publish VS Code Extension

on:
  release:
    types: [published]
  push:
    tags:
      - 'containless-extension-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only run for extension releases (skip CLI-only releases)
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'containless-extension-v'))

    permissions:
      contents: write  # Needed to upload .vsix to GitHub Release assets

    defaults:
      run:
        working-directory: ./vscode-extension

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build extension
        run: npm run build

      - name: Package extension (.vsix)
        run: vsce package --out containless.vsix

      - name: Upload .vsix to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ./vscode-extension/containless.vsix

      - name: Publish to VS Code Marketplace
        run: vsce publish -p ${{ secrets.VSCE_PAT }}
